<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!-- aqui vai a imagem no CSS -->
            </div>

            <div id="formulario">
                <h1>Login</h1>

                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>

                <form action="backend/login.php" method="post" autocomplete="on">

                    <div class="campo">

                        <label for="ilogin"><i class="material-symbols-outlined"> login</i></label>
                      
                        <input type="email"
                        name="login"
                        id="ilogin"
                        placeholder=" E-mail" required autocomplete="email">

                        <label class="escrita" for="ilogin"> Login</label>

                    </div>

                    <div class="campo">

                        <label for="isenha"><i class="material-symbols-outlined"> key </i></label>

                        <input type="password" name="senha" id="isenha" placeholder=" Senha" required autocomplete="current-password" minlength="8" maxlength="16">

                        <label class="escrita" for="isenha"> Senha</label>

                    </div>

                    <div>
                        <input type="submit" value="Entrar">
                    </div>

                    <a href="esqueci.html" class="botao"> Esqueci a Senha <i class="material-symbols-outlined">mail</i></a>

                </form>
            </div>

        </section>
    </main>
</body>

</html>
